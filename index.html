      let hostileCount = 0;
      let hostilePower = 0;
      for (const n of nbrs) {
        if (n.owner && n.owner !== s.id && !s.allies.has(n.owner)) {
          const ns = this.states.get(n.owner);
          if (ns && ns.alive) {
            hostileCount++;
            hostilePower += ns.power();
          }
        }
      }
      // 3. 兵力比(己方 vs 邻接敌国总和)
      const myPower = s.power();
      const powerRatio = hostilePower > 0 ? myPower / hostilePower : 99;
      // 触发条件:首都距前线 ≤1 + (邻接 ≥2 敌国 或 兵力比 < 0.6)
      const underThreat = capDist <= 1 && (hostileCount >= 2 || powerRatio < 0.6);
      if (!underThreat) continue;
      // === 候选评分 ===
      const cells = this.grid.cellsOf(s.id).filter(c =>
        !c.capital && c.terrain !== Terrain.LAKE
      );
      if (cells.length === 0) continue;
      let best = null, bestScore = -Infinity;
      for (const c of cells) {
        // 1. 距当前前线距离(越大越安全)
        const frontDist = c._frontDist ?? 0;
        if (frontDist < 2) continue;  // 必须在腹地内
        // 2. 距最近敌国边境距离(用近似:扫描周围 8 格半径内的敌国)
        // 用 BFS 半径 6 检测最近敌国格
        let minEnemyDist = 99;
        for (let dy = -6; dy <= 6 && minEnemyDist > 4; dy++) {
          for (let dx = -6; dx <= 6; dx++) {
            if (Math.abs(dx) + Math.abs(dy) > 6) continue;
            const n = this.grid.get(c.x + dx, c.y + dy);
            if (n && n.owner && n.owner !== s.id && !s.allies.has(n.owner)) {
              const d = Math.abs(dx) + Math.abs(dy) - 1;
              if (d < minEnemyDist) minEnemyDist = d;
            }
          }
        }
        if (minEnemyDist < 4) continue;  // 太近敌国,排除
        // 3. 周围平原格数(可扩张腹地)
        const cnbrs = this.grid.neighbors(c.x, c.y);
        const plainNbrs = cnbrs.filter(n => n.terrain === Terrain.PLAIN).length;
        // 4. 距当前首都距离(避免过近,但也不必最远)
        const capD = Math.abs(c.x - cx) + Math.abs(c.y - cy);
        // 综合评分:距敌远(权重最大) + 距前线远 + 腹地广 + 距旧都适中
        const score = minEnemyDist * 3 + frontDist * 2 + plainNbrs * 1.5 + Math.min(capD, 12) * 0.5;
        if (score > bestScore) { bestScore = score; best = c; }
      }
      if (!best) continue;
      // === 执行迁都 ===
      cap.capital = false;
      cap.city = true;
      cap.fortress = true;
      best.capital = true;
      best.city = false;
      best.fortress = true;
      // 迁都带走部分驻军(旧都留 1/3)
      const moveGarrison = Math.floor(cap.garrison * 0.66);
      cap.garrison -= moveGarrison;
      best.garrison = Math.floor(s.troops * 0.25) + moveGarrison;
      s.capital = [best.x, best.y];
      s.morale = Math.max(0, s.morale - 8);  // 迁都失民心(略减)
      if (s.food >= 150) s.food -= 150;  // 迁都消耗粮草
      s.lastRelocateTurn = this.turn;  // 记录迁都回合(用于冷却)
      cap.dirty = true;
      best.dirty = true;
      this.report(this.turn, 'event', `${s.name}国都告急,迁都至 (${best.x},${best.y})`, s);
    }
  }
  // 复国检查:分裂小国拿回原国都时,复国恢复国号,整合所有同源小国
  checkRestoration() {
    for (const s of Array.from(this.states.values())) {
      if (!s.alive || !s.isRump || !s.originNation) continue;
      const origin = this.states.get(s.originNation);
      if (!origin || !origin.fallen) continue;
      // 检查原国都格是否被本分裂国占领
      const capCell = this.grid.get(origin.capital[0], origin.capital[1]);
      if (!capCell || capCell.owner !== s.id) continue;
      // 复国:恢复原国号
      origin.fallen = false;
      origin.alive = true;
      origin.fallenBy = null;
      origin.cellCount = 0;
      // 整合所有同源分裂国的领土回原国(避免多个国都并存)
      const toRemove = [];
      for (const r of this.states.values()) {
        if (!r.isRump || r.originNation !== origin.id) continue;
        const rCells = this.grid.cellsOf(r.id);
        for (const c of rCells) {
          c.owner = origin.id;
          c.dirty = true;
          origin.cellCount++;
        }
        origin.troops += r.troops;
        origin.food += r.food;
        toRemove.push(r);
      }
      // 恢复原国都(可能被其他分裂国占领,现已归原国)
      capCell.owner = origin.id;
      capCell.capital = true;
      capCell.city = false;
      capCell.fortress = true;
      capCell.dirty = true;
      // 清除其他格子的 capital 标记(分裂国旧都降级为城)
      for (const r of toRemove) {
        const rCap = this.grid.get(r.capital[0], r.capital[1]);
        if (rCap && rCap.capital && rCap.owner === origin.id) {
          rCap.capital = false;
          rCap.city = true;
          rCap.dirty = true;
        }
      }
      origin.morale = Math.min(100, origin.morale + 30);
      // 移除所有同源分裂国
      for (const r of toRemove) {
        r.alive = false;
        r.cellCount = 0;
        this.states.delete(r.id);
        for (const o of this.states.values()) {
          o.neutralWith.delete(r.id);
          o.warTargets.delete(r.id);
          if (o.allies.has(r.id)) o.allies.delete(r.id);
        }
      }
      this.report(this.turn, 'capital', `${origin.name}复国!收复旧都故土,恢复宗庙社稷`, origin);
      // 安全清理:确保没有遗漏的格子指向已删除的分裂国
      const removedIds = new Set(toRemove.map(r => r.id));
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const c = this.grid.get(x, y);
          if (removedIds.has(c.owner)) {
            c.owner = origin.id;
            c.contestingOwner = null;
            c.contestTurns = 0;
            c.dirty = true;
            origin.cellCount++;
          }
        }
      }
      break;  // 一次只处理一个复国,避免循环中修改 states
    }
  }
  spawnParticles(x, y, count) {
    for (let i = 0; i < count; i++) {
      const p = {
        x: x * CELL_SIZE + CELL_SIZE / 2 + (Math.random() - 0.5) * CELL_SIZE,
        y: y * CELL_SIZE + CELL_SIZE / 2 + (Math.random() - 0.5) * CELL_SIZE,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        life: 1.0,
        color: Math.random() < 0.5 ? '#e8c887' : '#c8323a',
      };
      if (this.particles.length < this.maxParticles) {
        this.particles.push(p);
      } else {
        // 环形缓冲:覆盖最旧的,避免 shift() 的 O(n)
        this.particles[this.particleIdx] = p;
        this.particleIdx = (this.particleIdx + 1) % this.maxParticles;
      }
    }
  }
  updateParticles() {
    // 原地压缩:避免 splice() 的 O(n)
    let write = 0;
    for (let i = 0; i < this.particles.length; i++) {
      const p = this.particles[i];
      p.x += p.vx; p.y += p.vy;
      p.life -= 0.05;
      if (p.life > 0) {
        this.particles[write++] = p;
      }
    }
    this.particles.length = write;
    if (this.particles.length < this.maxParticles) this.particleIdx = this.particles.length;
  }
}

function s_recordBattle(attacker, defender, win) {
  attacker.recentBattles.unshift({ vs: defender.name, win, t: Date.now() });
  if (attacker.recentBattles.length > 8) attacker.recentBattles.pop();
  defender.recentBattles.unshift({ vs: attacker.name, win: !win, t: Date.now() });
  if (defender.recentBattles.length > 8) defender.recentBattles.pop();
}

// ==================== DiplomacyManager ====================
class DiplomacyManager {
  constructor(grid, states, reportCb) {
    this.grid = grid;
    this.states = states;
    this.report = reportCb;
    this.lastEval = 0;
  }
  tick(turn) {
    if (turn - this.lastEval < DIPLOMACY_INTERVAL) return;
    this.lastEval = turn;
    this.expireAlliances(turn);
    this.evaluateAlliances(turn);
    this.coordinateAlliedWars(turn);  // 盟国协同:强国号召盟国围攻同一目标
    this.evaluateNeutrality(turn);
    this.decayHatred();
  }
  // 盟国协同围攻:强国号召盟国对同一目标宣战
  // 触发条件:强国已有 warTarget,且盟友与该目标接壤
  coordinateAlliedWars(turn) {
    const alive = Array.from(this.states.values()).filter(s => s.alive);
    for (const s of alive) {
      if (s.allies.size === 0) continue;
      // s 已宣战的目标
      for (const targetId of Array.from(s.warTargets)) {
        const target = this.states.get(targetId);
        if (!target || !target.alive) continue;
        // 邀请盟友加入围攻
        for (const allyId of s.allies.keys()) {
          const ally = this.states.get(allyId);
          if (!ally || !ally.alive) continue;
          if (ally.warTargets.has(targetId)) continue;  // 已宣战
          // 关键校验:不能自己打自己,也不能打自己的盟友
          if (ally.id === targetId) continue;            // 盟友就是目标本身
          if (ally.allies.has(targetId)) continue;        // 盟友与目标是盟国
          if (target.allies.has(allyId)) continue;         // 目标与盟友是盟国
          // 必须与目标接壤(否则无法参与)
          const borders = this.bordersWith(ally.id, targetId);
          if (!borders) continue;
          // 60% 概率响应号召(受 persona.diplo 影响)
          const diplo = ally.persona.diplo || 50;
          if (Math.random() < 0.4 + diplo / 200) {
            ally.warTargets.add(targetId);
            ally.hatred[targetId] = (ally.hatred[targetId] || 0) + 15;
            this.report(turn, 'diplomacy', `${ally.name}响应${s.name}号召,共讨${target.name}`, ally);
          }
        }
      }
    }
  }
  // 检查两国是否接壤
  bordersWith(idA, idB) {
    const cellsA = this.grid.cellsOf(idA);
    for (const c of cellsA) {
      for (const n of this.grid.neighbors(c.x, c.y)) {
        if (n.owner === idB) return true;
      }
    }
    return false;
  }
  // 盟约过期/撕毁检查
  expireAlliances(turn) {
    for (const s of this.states.values()) {
      if (!s.alive) continue;
      // 遍历所有盟约,清除已过期
      for (const [allyId, exp] of Array.from(s.allies.entries())) {
        if (turn >= exp) {
          s.allies.delete(allyId);
          const ex = this.states.get(allyId);
          if (ex) ex.allies.delete(s.id);
          // 同步主 ally 字段
          if (s.ally === allyId) {
            s.ally = s.allies.size > 0 ? s.allies.keys().next().value : null;
            s.allyUntil = s.allies.size > 0 ? s.allies.get(s.ally) : 0;
          }
          this.report(turn, 'diplomacy', `${s.name}与${ex?.name || '?'}盟约期满,各奔东西`, s);
        }
      }
    }
  }
  // 撕毁盟约(含惩罚):撕毁方承受民心重创 + 声望受损 + 长冷却
  breakAllianceWithPenalty(turn, breaker, victim, reason) {
    breaker.breakAlliance(turn, victim.id, reason);
    victim.breakAlliance(turn, breaker.id, '被撕毁');
    // 双方仇恨 +40
    breaker.hatred[victim.id] = (breaker.hatred[victim.id] || 0) + 40;
    victim.hatred[breaker.id] = (victim.hatred[breaker.id] || 0) + 40;
    // 撕毁方惩罚:
    // 1. 民心 -15(失信于天下,百姓离心)
    breaker.morale = Math.max(0, breaker.morale - 15);
    // 2. 撕毁冷却延长(30 回合,普通 10)
    breaker.allyCooldown = turn + 30;
    // 3. 其他诸国对撕毁方仇恨 +5(视为不可靠,日后难再结盟)
    for (const s of this.states.values()) {
      if (s.id === breaker.id || s.id === victim.id || !s.alive) continue;
      s.hatred[breaker.id] = (s.hatred[breaker.id] || 0) + 5;
    }
    this.report(turn, 'diplomacy', `${breaker.name}愤而撕毁与${victim.name}盟约,${reason}!失信于天下,民心离散`, breaker);
  }
  // 多盟约:每国最多 maxAllies 个盟友(动态:3/2/1),可单方面撕毁
  evaluateAlliances(turn) {
    const alive = Array.from(this.states.values()).filter(s => s.alive);
    if (alive.length < 3) return;
    // 动态结盟上限:≥5国→3, 4国→2, 3国→1, ≤2国禁止(已在上方提前return)
    let maxAllies = 3;
    if (alive.length === 4) maxAllies = 2;
    else if (alive.length === 3) maxAllies = 1;
    this._maxAllies = maxAllies;  // 暴露给UI/调试
    const ranking = alive.sort((a, b) => b.power() - a.power());
    const strongest = ranking[0];
    const avgPower = alive.reduce((sum, s) => sum + s.power(), 0) / alive.length;
    const isHegemon = strongest.power() > avgPower * 1.4;
    // 合纵反制:当一国国力 > 其他六国总和的 40% 时,弱国结盟成功率+30%,盟约上限+50
    const othersPowerSum = alive.filter(s => s !== strongest).reduce((sum, s) => sum + s.power(), 0);
    const counterCoalition = strongest.power() > othersPowerSum * 0.4;
    // 1. 撕毁检查(提高阈值 + 撕毁惩罚)
    for (const s of alive) {
      if (s.allies.size === 0) continue;
      if (turn < s.allyCooldown) continue;
      for (const allyId of Array.from(s.allies.keys())) {
        const allyObj = this.states.get(allyId);
        if (!allyObj || !allyObj.alive) {
          s.allies.delete(allyId); continue;
        }
        // 仇恨盟友超过阈值(50,旧30) -> 撕毁
        if ((s.hatred[allyId] || 0) > 50) {
          this.breakAllianceWithPenalty(turn, s, allyObj, '旧怨难消');
          continue;
        }
        // 盟友国力远超自己(>2.0倍,旧1.8) -> 担忧被吞,撕毁(概率 0.2,旧 0.4)
        if (allyObj.power() > s.power() * 2.0 && Math.random() < 0.2) {
          this.breakAllianceWithPenalty(turn, s, allyObj, '忌惮其势大');
          continue;
        }
      }
    }
    // 2. 缔结新盟约(每国最多 maxAllies 个)
    const target = isHegemon ? strongest : ranking[0];
    const candidates = isHegemon ? ranking.slice(1) : ranking.slice(-3);
    // 合纵:弱国与弱国结对(最多 maxAllies 个盟友)
    for (const w of candidates) {
      if (w.allies.size >= maxAllies || turn < w.allyCooldown) continue;
      if (w.id === target.id) continue;
      for (const w2 of candidates) {
        if (w2.id === w.id || w2.allies.size >= maxAllies || turn < w2.allyCooldown) continue;
        if (w2.id === target.id) continue;
        if (w.allies.has(w2.id)) continue;
        // 合纵反制:霸权时成功率 +30%(原 50% 提升至 65%),盟约上限 +50 回合
        if (counterCoalition && Math.random() < 0.3) continue;  // 跳过概率更低
        // 缔约:弱国合纵需长期盟约,由国家自主决定(250-300 回合)
        // 实力越接近,共同利益越牢固,盟约越长
        const powerGap = Math.abs(w.power() - w2.power()) / Math.max(1, w.power() + w2.power());
        let baseDur = 250 + Math.floor((1 - powerGap) * 30);  // 250-280 由实力差距决定
        if (counterCoalition) baseDur += 50;  // 合纵反制:盟约 +50
        const duration = baseDur + Math.floor(Math.random() * 20);  // 250-350 浮动
        w.allies.set(w2.id, turn + duration);
        w2.allies.set(w.id, turn + duration);
        if (w.ally === null) { w.ally = w2.id; w.allyUntil = turn + duration; }
        if (w2.ally === null) { w2.ally = w.id; w2.allyUntil = turn + duration; }
        w.warTargets.add(target.id);
        w2.warTargets.add(target.id);
        if (w.hatred[w2.id]) w.hatred[w2.id] = 0;
        if (w2.hatred[w.id]) w2.hatred[w.id] = 0;
        w.hatred[target.id] = (w.hatred[target.id] || 0) + 20;
        w2.hatred[target.id] = (w2.hatred[target.id] || 0) + 20;
        this.report(turn, 'diplomacy', `${w.name}与${w2.name}歃血为盟,合纵抗${target.name}(${duration}回合)`, w);
        if (w.allies.size >= maxAllies) break;
      }
    }
    // 连横:强国与中等国结对(强国也可有 maxAllies 个盟友)
    if (strongest.allies.size < maxAllies && turn >= strongest.allyCooldown) {
      const middles = ranking.slice(1, -3);
      for (const m of middles) {
        if (m.allies.size >= maxAllies || turn < m.allyCooldown) continue;
        if (strongest.allies.has(m.id)) continue;
        if (Math.random() < 0.5) {
          // 连横:强国短期利用盟约,150-220 回合(强国主动选择,较短)
          const duration = 150 + Math.floor(Math.random() * 70);  // 150-220 回合
          strongest.allies.set(m.id, turn + duration);
          m.allies.set(strongest.id, turn + duration);
          if (strongest.ally === null) { strongest.ally = m.id; strongest.allyUntil = turn + duration; }
          if (m.ally === null) { m.ally = strongest.id; m.allyUntil = turn + duration; }
          const victim = ranking[ranking.length - 1];
          if (victim && victim.alive) {
            m.warTargets.add(victim.id);
            strongest.warTargets.add(victim.id);
          }
          if (strongest.hatred[m.id]) strongest.hatred[m.id] = 0;
          if (m.hatred[strongest.id]) m.hatred[strongest.id] = 0;
          this.report(turn, 'diplomacy', `${strongest.name}与${m.name}连横之约,共图天下(${duration}回合)`, strongest);
          if (strongest.allies.size >= maxAllies) break;
        }
      }
    }
    // 3. 清理:盟友不互攻,warTargets 中移除盟友
    for (const s of alive) {
      for (const allyId of s.allies.keys()) {
        if (s.warTargets.has(allyId)) s.warTargets.delete(allyId);
        if (s.hatred[allyId]) s.hatred[allyId] = 0;
      }
    }
  }
  decayHatred() {
    for (const s of this.states.values()) {
      if (!s.alive) continue;
      for (const k of Object.keys(s.hatred)) {
        s.hatred[k] *= 0.92;
        if (s.hatred[k] < 1) delete s.hatred[k];
      }
    }
  }
  // 中立关系评估:既不结盟也不征战
  // 条件:接壤 + 双方仇恨低 + 无战争目标 + 实力差距适中
  // 一旦条件不满足(仇恨累积/实力失衡/被设为战争目标),中立自动解除
  evaluateNeutrality(turn) {
    const alive = Array.from(this.states.values()).filter(s => s.alive);
    // 收集每对国家是否接壤
    const borders = new Map();
    for (const s of alive) {
      for (const c of this.grid.cellsOf(s.id)) {
        for (const n of this.grid.neighbors(c.x, c.y)) {
          if (n.owner && n.owner !== s.id) {
            const key = [s.id, n.owner].sort().join('|');
            borders.set(key, true);
          }
        }
      }
    }
    for (const s of alive) {
      for (const o of alive) {
        if (o.id === s.id) continue;
        const key = [s.id, o.id].sort().join('|');
        // 盟友关系:不中立
        if (s.allies.has(o.id)) { s.neutralWith.delete(o.id); continue; }
        // 不接壤:无中立关系(远国天然不交战,无需中立标记)
        if (!borders.has(key)) { s.neutralWith.delete(o.id); continue; }
        const hate = s.hatred[o.id] || 0;
        const reverseHate = o.hatred[s.id] || 0;
        const sPower = s.power(), oPower = o.power();
        const powerGap = Math.abs(sPower - oPower) / Math.max(1, sPower + oPower);
        // 中立维持条件:
        //   双方仇恨都低(<8)、互相不是战争目标、实力差距适中(<0.5)
        //   且双方都没被对方列入 warTargets
        const lowHate = hate < 8 && reverseHate < 8;
        const noWarTarget = !s.warTargets.has(o.id) && !o.warTargets.has(s.id);
        const balancedPower = powerGap < 0.5;
        if (lowHate && noWarTarget && balancedPower) {
          // 一定随机性:避免所有接壤国都立即中立
          if (!s.neutralWith.has(o.id) && Math.random() < 0.4) {
            s.neutralWith.add(o.id);
          }
        } else {
          // 条件不满足,解除中立
          s.neutralWith.delete(o.id);
        }
      }
    }
  }
}

// ==================== Renderer ====================
class Renderer {
  constructor(canvas, grid, states, engine) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.grid = grid;
    this.states = states;
    this.engine = engine;
    // 静态层:地形+国家色+城市/首都标记+边框+联盟线,只在 dirty 时更新
    this.static = document.createElement('canvas');
    this.static.width = canvas.width;
    this.static.height = canvas.height;
    this.staticCtx = this.static.getContext('2d');
    this.staticDirty = true;  // 首次全画
    this.hoverCell = null;
    this.frame = 0;
  }
  markStaticDirty() { this.staticDirty = true; }
  draw() {
    this.frame++;
    // 静态层:检查 dirty 格,增量更新
    if (this.staticDirty) {
      this.redrawStaticFull();
    } else {
      this.redrawStaticDirty();
    }
    // 主 canvas:复制静态层
    const ctx = this.ctx;
    ctx.drawImage(this.static, 0, 0);
    // 动态层:交战闪烁(每帧重画)
    for (let y = 0; y < GRID_H; y++) {
      for (let x = 0; x < GRID_W; x++) {
        const c = this.grid.get(x, y);
        if (c.contestingOwner) this.drawContesting(ctx, c);
      }
    }
    // 联盟线:动态层实时绘制(灭亡国自动无连线,因 allies 在 eliminate 时已清理)
    this.drawAllianceLines(ctx);
    // 行军轨迹:动态层绘制在途兵力流动
    this.drawMarching(ctx);
    // 粒子
    this.drawParticles(ctx);
    // hover
    if (this.hoverCell) {
      const c = this.hoverCell;
      ctx.strokeStyle = '#e8c887';
      ctx.lineWidth = 2;
      ctx.strokeRect(c.x * CELL_SIZE + 1, c.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
    }
  }
  // 全量重画静态层
  redrawStaticFull() {
    const ctx = this.staticCtx;
    ctx.fillStyle = '#050507';
    ctx.fillRect(0, 0, this.static.width, this.static.height);
    for (let y = 0; y < GRID_H; y++)
      for (let x = 0; x < GRID_W; x++) {
        const c = this.grid.get(x, y);
        this.drawCellStatic(ctx, c);
        c.dirty = false;
      }
    this.drawGridLines(ctx);
    this.drawBorders(ctx);
    this.staticDirty = false;
  }
  // 增量重画 dirty 格及其邻居(邻居像素中的旧边界需清除)
  redrawStaticDirty() {
    let hasDirty = false;
    for (let y = 0; y < GRID_H && !hasDirty; y++) {
      for (let x = 0; x < GRID_W; x++) {
        if (this.grid.get(x, y).dirty) { hasDirty = true; break; }
      }
    }
    if (!hasDirty) return;
    const ctx = this.staticCtx;
    // 收集需要重画的格子:dirty 格 + 其四邻(邻居像素中的旧边界需清除)
    const toRedraw = new Set();
    for (let y = 0; y < GRID_H; y++) {
      for (let x = 0; x < GRID_W; x++) {
        const c = this.grid.get(x, y);
        if (c.dirty) {
          toRedraw.add(c);
          for (const n of this.grid.neighbors(x, y)) toRedraw.add(n);
        }
      }
    }
    for (const c of toRedraw) {
      this.drawCellStatic(ctx, c);
      c.dirty = false;
    }
    // 内部网格线统一画一次(避免逐格 strokeRect 叠加导致粗细不一)
    this.drawGridLines(ctx);
    // 国家边界
    this.drawBorders(ctx);
  }
  // 统一画内部网格线:每条线只画一次,0.5px 对齐确保清晰
  drawGridLines(ctx) {
    ctx.strokeStyle = 'rgba(20,18,12,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    // 垂直线
    for (let x = 0; x <= GRID_W; x++) {
      const px = x * CELL_SIZE + 0.5;
      ctx.moveTo(px, 0);
      ctx.lineTo(px, GRID_H * CELL_SIZE);
    }
    // 水平线
    for (let y = 0; y <= GRID_H; y++) {
      const py = y * CELL_SIZE + 0.5;
      ctx.moveTo(0, py);
      ctx.lineTo(GRID_W * CELL_SIZE, py);
    }
    ctx.stroke();
  }
  // 静态层绘制:地形+国家色(兵力深浅)+粮仓+城市+首都
  drawCellStatic(ctx, c) {
    const px = c.x * CELL_SIZE, py = c.y * CELL_SIZE;
    ctx.fillStyle = TerrainColor[c.terrain];
    ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
    if (c.owner) {
      const s = this.states.get(c.owner);
      // 只渲染有效国家的颜色;无效 owner(指向已删除国家)显示纯地形
      // 注意:不在此修改 c.owner,避免渲染副作用导致数据不一致
      if (s) {
        // 河流格:不覆盖国家色,只画一个小角标表示归属(兵力仍可渡河)
        if (c.terrain === Terrain.RIVER) {
          ctx.fillStyle = s.color;
          ctx.fillRect(px + 1, py + 1, 5, 5);  // 左上角小色块
          // 若有驻军,画一个小点表示兵力强度
          if (c.garrison > 0) {
            const intensity = Math.min(1, c.garrison / 200);
            ctx.fillStyle = `rgba(0,0,0,${0.2 + intensity * 0.3})`;
            ctx.fillRect(px + CELL_SIZE/2 - 2, py + CELL_SIZE/2 - 2, 4, 4);
          }
        } else {
          // 颜色深浅 = 兵力需求度(距前线越近需求越大→越深;后方需求小→浅)
          // 国都周边额外加成(适度加深,不主导)
          const dist = (c._frontDist === undefined) ? 0 : c._frontDist;
          // 距前线归一化:0(前线)→1, 6+(远后方)→1
          const frontness = Math.min(1, dist / 6);
          // 主攻锚点附近(集中进攻方向):额外加深
          let anchorBoost = 0;
          if (s.attackAnchor) {
            const da = Math.abs(c.x - s.attackAnchor.x) + Math.abs(c.y - s.attackAnchor.y);
            if (da <= 3) anchorBoost = (4 - da) * 0.08;  // 0.08-0.24
          }
          // 国都周边加成(适度,3 格内 +0.06~+0.02)
          const [ccx, ccy] = s.capital;
          const dc = Math.abs(c.x - ccx) + Math.abs(c.y - ccy);
          const capitalBoost = dc <= 3 ? (4 - dc) * 0.02 : 0;
          // 总深色覆盖:前线 0.45 + 锚点加成 + 国都加成(封顶 0.6)
          // 后方 0(纯原色,浅)
          const darkness = Math.min(0.6, (1 - frontness) * 0.45 + anchorBoost + capitalBoost);
          ctx.fillStyle = s.color;
          ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
          if (darkness > 0.02) {
            ctx.fillStyle = `rgba(0,0,0,${darkness})`;
            ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
          }
        }
      }
    }
    // 内部格边界不再逐格绘制(会导致共享边叠加粗细不一)
    // 改为在 drawGridLines 中统一画一次
    // 粮仓标记 ▲
    if (c.granary && !c.capital) {
      ctx.fillStyle = '#e8c887';
      ctx.beginPath();
      ctx.moveTo(px + CELL_SIZE/2, py + 5);
      ctx.lineTo(px + CELL_SIZE - 5, py + CELL_SIZE - 5);
      ctx.lineTo(px + 5, py + CELL_SIZE - 5);
      ctx.closePath();
      ctx.stroke();
    }
    // 别城(要塞框 + ● 标记)
    if (c.city && !c.capital) {
      ctx.strokeStyle = '#c9a96a';
      ctx.lineWidth = 1.2;
      ctx.strokeRect(px + 2, py + 2, CELL_SIZE - 4, CELL_SIZE - 4);
      ctx.fillStyle = '#e8c887';
      ctx.beginPath();
      ctx.arc(px + CELL_SIZE/2, py + CELL_SIZE/2, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // 首都 ★
    if (c.capital) {
      ctx.fillStyle = '#ffe890';
      ctx.font = '14px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', px + CELL_SIZE/2, py + CELL_SIZE/2 + 1);
    }
  }
  // 动态层:交战闪烁 + 剑
  drawContesting(ctx, c) {
    const px = c.x * CELL_SIZE, py = c.y * CELL_SIZE;
    const s = this.states.get(c.contestingOwner);
    if (!s) return;
    const flash = 0.35 + Math.sin(this.frame * 0.35) * 0.25;
    ctx.fillStyle = hexA(s.bright, flash);
    ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
    this.drawSword(ctx, px + CELL_SIZE/2, py + CELL_SIZE/2);
  }
  drawSword(ctx, cx, cy) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 5);
    ctx.lineTo(cx, cy + 4);
    ctx.moveTo(cx - 3, cy - 2);
    ctx.lineTo(cx + 3, cy - 2);
    ctx.moveTo(cx, cy + 4);
    ctx.lineTo(cx, cy + 6);
    ctx.stroke();
  }
  drawBorders(ctx) {
    ctx.lineWidth = 2;
    for (let y = 0; y < GRID_H; y++)
      for (let x = 0; x < GRID_W; x++) {
        const c = this.grid.get(x, y);
        if (!c.owner) continue;
        const s = this.states.get(c.owner);
        if (!s) continue;  // owner 无效:不画此格的边界,由有效邻居画
        const nbrs = [
          { dx: 0, dy: -1, edge: 'top' },
          { dx: 0, dy: 1, edge: 'bottom' },
          { dx: -1, dy: 0, edge: 'left' },
          { dx: 1, dy: 0, edge: 'right' },
        ];
        for (const e of nbrs) {
          const n = this.grid.get(x + e.dx, y + e.dy);
          // 邻居无主、或归属不同国家(含无效owner)→ 画边界
          if (!n || n.owner !== c.owner) {
            ctx.strokeStyle = 'rgba(20,18,12,0.95)';
            ctx.beginPath();
            const px = x * CELL_SIZE, py = y * CELL_SIZE;
            // 0.5 对齐:让线落在像素中心,避免抗锯齿模糊
            if (e.edge === 'top') { ctx.moveTo(px, py + 0.5); ctx.lineTo(px + CELL_SIZE, py + 0.5); }
            if (e.edge === 'bottom') { ctx.moveTo(px, py + CELL_SIZE - 0.5); ctx.lineTo(px + CELL_SIZE, py + CELL_SIZE - 0.5); }
            if (e.edge === 'left') { ctx.moveTo(px + 0.5, py); ctx.lineTo(px + 0.5, py + CELL_SIZE); }
            if (e.edge === 'right') { ctx.moveTo(px + CELL_SIZE - 0.5, py); ctx.lineTo(px + CELL_SIZE - 0.5, py + CELL_SIZE); }
            ctx.stroke();
          }
        }
      }
  }
  drawAllianceLines(ctx) {
    const drawn = new Set();
    const lines = [];
    for (const s of this.states.values()) {
      if (!s.alive || s.allies.size === 0) continue;
      for (const [allyId, exp] of s.allies) {
        const key = [s.id, allyId].sort().join('-');
        if (drawn.has(key)) continue;
        drawn.add(key);
        const a = this.states.get(allyId);
        if (!a || !a.alive) continue;
        const pair = this.findAllianceEndpoints(s, a);
        if (!pair) continue;
        lines.push({ p1: pair.p1, p2: pair.p2, exp, key, adjacent: pair.adjacent });
      }
    }
    // 绘制:全部使用淡色虚线(接壤=短虚线,远距离=弧形虚线)
    for (const line of lines) {
      const { p1, p2, exp, key, adjacent } = line;
      const remaining = exp - this.engine.turn;
      const urgent = remaining < 5;
      if (urgent) {
        // 即将过期:红色虚线闪烁
        const alpha = 0.4 + Math.sin(this.frame * 0.3) * 0.3;
        ctx.strokeStyle = hexA('#c8323a', alpha);
      } else {
        // 淡金色虚线
        ctx.strokeStyle = hexA('#e8c887', 0.4);
      }
      ctx.setLineDash([5, 3]);  // 统一虚线
      ctx.lineWidth = 1.0;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      if (adjacent) {
        // 接壤:直接短线
        ctx.lineTo(p2.x, p2.y);
      } else {
        // 远距离:贝塞尔曲线,根据 key 哈希做垂直偏移,避免多条线重叠
        const hash = key.split('').reduce((s, c) => s + c.charCodeAt(0), 0);
        const offsetDir = (hash % 2 === 0) ? 1 : -1;
        const offsetMag = 8 + (hash % 20);  // 8-28 px
        const mx = (p1.x + p2.x) / 2;
        const my = (p1.y + p2.y) / 2;
        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len, ny = dx / len;
        const cx = mx + nx * offsetMag * offsetDir;
        const cy = my + ny * offsetMag * offsetDir;
        ctx.quadraticCurveTo(cx, cy, p2.x, p2.y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  // 找联盟线两端:优先接壤边境点(实际接触面),否则用首都
  findAllianceEndpoints(sA, sB) {
    // 1. 接壤:从 A 前线找邻接 B 的格子
    const front = sA.frontLine || [];
    for (const c of front) {
      for (const n of this.grid.neighbors(c.x, c.y)) {
        if (n.owner === sB.id) {
          return {
            adjacent: true,
            p1: { x: c.x * CELL_SIZE + CELL_SIZE/2, y: c.y * CELL_SIZE + CELL_SIZE/2 },
            p2: { x: n.x * CELL_SIZE + CELL_SIZE/2, y: n.y * CELL_SIZE + CELL_SIZE/2 }
          };
        }
      }
    }
    // 2. 不接壤:用各自首都
    return {
      adjacent: false,
      p1: { x: sA.capital[0] * CELL_SIZE + CELL_SIZE/2, y: sA.capital[1] * CELL_SIZE + CELL_SIZE/2 },
      p2: { x: sB.capital[0] * CELL_SIZE + CELL_SIZE/2, y: sB.capital[1] * CELL_SIZE + CELL_SIZE/2 }
    };
  }
  centerOf(id) {
    const cells = this.grid.cellsOf(id);
    if (cells.length === 0) {
      // 已亡国:用首都坐标
      const s = this.states.get(id);
      if (s) return { x: s.capital[0] * CELL_SIZE + CELL_SIZE/2, y: s.capital[1] * CELL_SIZE + CELL_SIZE/2 };
      return null;
    }
    let sx = 0, sy = 0;
    for (const c of cells) { sx += c.x; sy += c.y; }
    return { x: (sx / cells.length) * CELL_SIZE + CELL_SIZE/2, y: (sy / cells.length) * CELL_SIZE + CELL_SIZE/2 };
  }
  drawParticles(ctx) {
    for (const p of this.engine.particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
    }
    ctx.globalAlpha = 1;
  }
  // 行军轨迹:在途兵力可视化
  // 每条 marching 显示为: 起点终点虚线 + 移动中的圆点(代表兵力)
  drawMarching(ctx) {
    for (const s of this.states.values()) {
      if (!s.alive || s.marching.length === 0) continue;
      for (const m of s.marching) {
        const fx = m.fromX * CELL_SIZE + CELL_SIZE/2;
        const fy = m.fromY * CELL_SIZE + CELL_SIZE/2;
        const tx = m.toX * CELL_SIZE + CELL_SIZE/2;
        const ty = m.toY * CELL_SIZE + CELL_SIZE/2;
        // 进度:基于回合 + 帧动画微偏移(让点持续流动)
        const totalTurns = Math.max(1, m.arriveTurn - m.startTurn);
        const elapsed = this.engine.turn - m.startTurn;
        const baseProgress = Math.max(0, Math.min(1, elapsed / totalTurns));
        // 帧动画:0-1 之间循环(每 30 帧一轮),用于多个小点形成流动效果
        const animPhase = (this.frame % 30) / 30;
        // 虚线轨迹(浅色)
        ctx.strokeStyle = hexA(s.bright, 0.35);
        ctx.setLineDash([3, 3]);
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(fx, fy);
        ctx.lineTo(tx, ty);
        ctx.stroke();
        ctx.setLineDash([]);
        // 主兵力点(随回合推进)
        const px = fx + (tx - fx) * baseProgress;
        const py = fy + (ty - fy) * baseProgress;
        // 兵力大小随数量缩放
        const r = Math.max(2.5, Math.min(5, 2 + m.troops / 80));
        ctx.fillStyle = s.bright;
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
        // 兵力数字
        ctx.fillStyle = '#fff';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(Math.floor(m.troops), px, py - 8);
        // 流动小点(沿路径分布,营造"行军流"感)
        for (let i = 0; i < 3; i++) {
          const t = (animPhase + i / 3) % 1;
          // 小点在主兵力后方一段路径上分布
          const subProgress = Math.max(0, baseProgress - 0.15 - t * 0.4);
          if (subProgress <= 0 || subProgress >= baseProgress) continue;
          const sx = fx + (tx - fx) * subProgress;
          const sy = fy + (ty - fy) * subProgress;
          ctx.fillStyle = hexA(s.bright, 0.5);
          ctx.beginPath();
          ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }
}

function hexA(hex, a) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// ==================== UIPanel ====================
class UIPanel {
  constructor(states, engine, diplomacy, app) {
    this.states = states;
    this.engine = engine;
    this.diplomacy = diplomacy;
    this.app = app;
    this.selected = null;
    this.reportCount = 0;
    this.bindTabs();
  }
  bindTabs() {
    const tabs = document.getElementById('nationTabs');
    tabs.innerHTML = '';
    for (const s of this.states.values()) {
      const t = document.createElement('div');
      t.className = 'nation-tab';
      t.dataset.id = s.id;
      t.textContent = s.name;
      t.style.color = s.bright;
      t.onclick = () => this.select(s.id);
      tabs.appendChild(t);
    }
  }
  select(id) {
    this.selected = id;
    document.querySelectorAll('.nation-tab').forEach(t => {
      t.classList.toggle('selected', t.dataset.id === id);
    });
    this.renderDetail();
  }
  addReport(turn, type, text, state) {
    // 重大事件(灭国/溃败/外交)直接上报;普通战报限速:每国每 5 回合最多 1 条
    const isMajor = type === 'capital' || type === 'diplomacy';
    if (!isMajor && state) {
      const last = state.lastReportTurn || 0;
      if (turn - last < 5) return;  // 5 回合内已上报过,跳过
      state.lastReportTurn = turn;
    }
    const box = document.getElementById('reports');
    const r = document.createElement('div');
    r.className = `report ${type}`;
    const tag = state ? `<span class="tag" style="background:${state.bright}">${state.name}</span>` : '';
    r.innerHTML = `<span class="turn">T${turn}</span>${tag}${text}`;
    box.appendChild(r);
    // 限制 DOM 节点数,避免堆积卡死
    while (box.children.length > 120) box.removeChild(box.firstChild);
    // scrollTop 节流:仅在用户已滚到底部时自动滚动,避免频繁重排
    if (!this._scrollPending) {
      this._scrollPending = true;
      requestAnimationFrame(() => {
        box.scrollTop = box.scrollHeight;
        this._scrollPending = false;
      });
    }
    this.reportCount++;
    document.getElementById('reportCount').textContent = `${this.reportCount} 条`;
  }
  renderRanking() {
    const box = document.getElementById('ranking');
    const arr = Array.from(this.states.values()).sort((a, b) => b.power() - a.power());
    const maxPower = Math.max(...arr.map(s => s.power()), 1);
    box.innerHTML = arr.map((s, i) => {
      const pct = (s.power() / maxPower) * 100;
      const dead = s.alive ? '' : 'dead';
      return `<div class="rank-row ${dead}">
        <span class="rk">${i+1}</span>
        <span class="nm" style="color:${s.bright}">${s.name}</span>
        <span class="bar"><div style="width:${pct}%;background:${s.color}"></div></span>
        <span class="pw">${Math.floor(s.power())}</span>
        <span class="ct">${s.cellCount}城</span>
      </div>`;
    }).join('');
  }
  renderDetail() {
    const body = document.getElementById('detailBody');
    if (!this.selected) {
      body.innerHTML = '<div style="color:#4a4639;text-align:center;padding:20px">点击上方国号查看详情</div>';
      return;
    }
    const s = this.states.get(this.selected);
    if (!s) return;
    const top = s.topHatred();
    const hatedName = top.target ? this.states.get(top.target)?.name : '—';
    const hatedColor = top.target ? this.states.get(top.target)?.bright : '#4a4639';
    const inTruce = this.engine.turn < s.truceUntil;
    const ptName = s.primaryTarget ? this.states.get(s.primaryTarget)?.name : '—';
    const ptColor = s.primaryTarget ? this.states.get(s.primaryTarget)?.bright : '#4a4639';
    const capOwned = this.grid_capitalOwned(s);
    const maxHatred = Math.max(100, top.value);
    const hatredPct = Math.min(100, (top.value / maxHatred) * 100);
    // 盟约信息(支持多个盟友)
    let allyInfo = '无盟约';
    let allyColor = '#4a4639';
    if (s.allies.size > 0) {
      const parts = [];
      let minRemaining = 999;
      for (const [allyId, exp] of s.allies) {
        const allyObj = this.states.get(allyId);
        const remaining = exp - this.engine.turn;
        if (allyObj && remaining > 0) {
          parts.push(`${allyObj.name}(${remaining})`);
          if (remaining < minRemaining) minRemaining = remaining;
        }
      }
      if (parts.length > 0) {
        allyInfo = parts.join('、');
        allyColor = minRemaining < 5 ? '#c8323a' : '#e8c887';
      }
    } else if (this.engine.turn < s.allyCooldown) {
      allyInfo = `毁约冷却中 (余 ${s.allyCooldown - this.engine.turn} 回合)`;
      allyColor = '#8a4a4a';
    }

    body.innerHTML = `
      <div class="detail-row"><span class="label">国号</span><span class="val" style="color:${s.bright}">${s.name}</span></div>
      <div class="detail-row"><span class="label">状态</span><span class="val" style="color:${s.alive ? (inTruce ? '#b8923a' : '#5ac888') : '#c8323a'}">${s.alive ? (inTruce ? '休整中' : (s.stance === 'defend' ? '防御' : '进攻')) : '已亡'}</span></div>
      <div class="detail-row"><span class="label">都城</span><span class="val" style="color:${capOwned ? '#e8c887' : '#c8323a'}">${capOwned ? '坚守' : '陷落'}</span></div>
      <div class="detail-row"><span class="label">国力</span><span class="val" style="color:var(--gold-bright)">${Math.floor(s.power())}</span></div>
      <div class="detail-row"><span class="label">兵力</span><span class="val">${Math.floor(s.troops)} <span style="color:#4a4639;font-size:10px">/ 粮 ${Math.floor(s.food)}</span></span></div>
      <div class="detail-row"><span class="label">民心</span><span class="val" style="color:${s.morale < 30 ? '#c8323a' : (s.morale < 70 ? '#b8923a' : '#5ac888')}">${Math.floor(s.morale)}%${s.morale < 30 ? ' ⚠' : ''}</span></div>
      <div class="detail-row"><span class="label">领土</span><span class="val">${s.cellCount} 城 <span style="color:#4a4639;font-size:10px">/ 别城 ${s.cityCount}</span></span></div>
      <div class="detail-row"><span class="label">主将</span><span class="val" style="color:var(--gold)">${s.topGeneral().name} <span style="color:#4a4639;font-size:10px">统帅${s.topGeneral().command}</span></span></div>
      <div class="detail-row"><span class="label">盟约</span><span class="val" style="color:${allyColor}">${allyInfo}<span style="color:#4a4639;font-size:10px"> (上限${this.diplomacy._maxAllies ?? 3})</span></span></div>
      <div class="detail-row"><span class="label">宿敌</span><span class="val" style="color:${hatedColor}">${hatedName}</span></div>
      <div class="hatred-bar"><div style="width:${hatredPct}%"></div></div>
      <div class="obj-box">
        <div class="obj-title">战略目标</div>
        ${this.getStrategy(s)}
      </div>
      <div class="trend-box">
        <div class="trend-title"><span>兴衰趋势</span><span class="hint">近 ${s.history ? s.history.length : 0} 采样</span></div>
        ${this.renderSparklines(s)}
      </div>
    `;
  }
  grid_capitalOwned(s) {
    const c = this.engine.grid.get(s.capital[0], s.capital[1]);
    return c && c.owner === s.id;
  }
  // 生成 sparkline SVG:4 条趋势线(国力/领土/兵力/民心)
  renderSparklines(s) {
    if (!s.history || s.history.length < 2) {
      return '<div style="color:#4a4639;font-size:10px">数据采集中(满 20 回合显示)...</div>';
    }
    const W = 280, H = 22;
    const series = [
      { key: 'power', label: '国力', color: s.bright },
      { key: 'cells', label: '领土', color: '#e8c887' },
      { key: 'troops', label: '兵力', color: '#c8323a' },
      { key: 'morale', label: '民心', color: '#5ac888' }
    ];
    return series.map(({ key, label, color }) => {
      const vals = s.history.map(h => h[key]);
      const min = Math.min(...vals);
      const max = Math.max(...vals);
      const range = max - min || 1;
      const pts = vals.map((v, i) => {
        const x = (i / (vals.length - 1)) * W;
        const y = H - ((v - min) / range) * (H - 4) - 2;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      const cur = vals[vals.length - 1];
      const first = vals[0];
      const delta = cur - first;
      const deltaStr = delta >= 0 ? `+${Math.round(delta)}` : `${Math.round(delta)}`;
      const deltaColor = delta >= 0 ? '#5ac888' : '#c8323a';
      return `<div class="spark-row">
        <span class="spark-label">${label}</span>
        <svg class="spark-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
        <span style="color:${deltaColor};font-size:9px;width:36px;text-align:right">${deltaStr}</span>
      </div>`;
    }).join('');
  }
  getStrategy(s) {
    if (!s.alive) return '社稷已亡,无复战略';
    if (this.engine.turn < s.truceUntil) return `休整至 T${s.truceUntil},恢复国力`;
    if (s.stance === 'defend') return '转入防御,固守待变';
    if (s.primaryTarget) {
      const t = this.states.get(s.primaryTarget);
      const capC = this.engine.grid.get(t.capital[0], t.capital[1]);
      const dist = Math.abs(capC.x - s.capital[0]) + Math.abs(capC.y - s.capital[1]);
      return `集中兵力攻伐 ${t.name},距其都城 ${dist} 步`;
    }
    return '观望待机,寻找可乘之隙';
  }
  refreshTabs() {
    document.querySelectorAll('.nation-tab').forEach(t => {
      const s = this.states.get(t.dataset.id);
      t.classList.toggle('dead', !s.alive);
    });
  }
}

// ==================== App ====================
class App {
  constructor() {
    this.canvas = document.getElementById('grid');
    this.speed = 500;
    this.scenarioId = 'random';  // 当前剧本
    this.init();
  }
  init() {
    this.grid = new Grid();
    this.states = new Map();
    // 根据剧本生成:random 用随机出生,其他用预设领土
    const sc = SCENARIOS[this.scenarioId];
    const nations = (sc && sc.setup) ? generateNationsFromScenario(this.scenarioId) : generateNations();
    for (const cfg of nations) this.states.set(cfg.id, new State(cfg));
    this.grid.initNations(nations);
    // 剧本预设外交关系(仇恨/盟约/宣战)
    if (sc && sc.setup) this.applyScenarioDiplomacy(sc.setup);

    this.engine = new BattleEngine(this.grid, this.states, (t, ty, txt, s) => this.ui.addReport(t, ty, txt, s));
    this.diplomacy = new DiplomacyManager(this.grid, this.states, (t, ty, txt, s) => this.ui.addReport(t, ty, txt, s));
    this.renderer = new Renderer(this.canvas, this.grid, this.states, this.engine);
    this.ui = new UIPanel(this.states, this.engine, this.diplomacy, this);

    this.running = false;
    this.timer = null;

    this.bindControls();
    this.bindHover();
    this.ui.select('qin');
    this.ui.renderRanking();
    this.updateStatus(sc ? `剧本: ${sc.name}` : '已就绪');
    if (sc && sc.setup) this.ui.addReport(0, 'event', `剧本开启: ${sc.name} — ${sc.desc}`, null);
    this.render();
  }
  // 应用剧本预设外交
  applyScenarioDiplomacy(setup) {
    if (setup.hatred) {
      for (const [a, b, v] of setup.hatred) {
        const sa = this.states.get(a);
        if (sa) sa.hatred[b] = (sa.hatred[b] || 0) + v;
      }
    }
    if (setup.alliances) {
      for (const [a, b, dur] of setup.alliances) {
        const sa = this.states.get(a), sb = this.states.get(b);
        if (sa && sb) {
          sa.allies.set(b, dur);
          sb.allies.set(a, dur);
          sa.ally = b;
          sb.ally = a;
        }
      }
    }
    if (setup.warTargets) {
      for (const [a, b] of setup.warTargets) {
        const sa = this.states.get(a);
        if (sa) sa.warTargets.add(b);
      }
    }
  }
  bindControls() {
    document.getElementById('btnPlay').onclick = () => this.toggle();
    document.getElementById('btnStep').onclick = () => this.step();
    document.getElementById('btnReset').onclick = () => this.reset();
    document.getElementById('btnShot').onclick = () => this.exportScreenshot();
    // 剧本选择器:填充选项 + 切换事件
    const selEl = document.getElementById('scenarioSelect');
    const descEl = document.getElementById('scenarioDesc');
    selEl.innerHTML = '';
    for (const [id, sc] of Object.entries(SCENARIOS)) {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = sc.name;
      selEl.appendChild(opt);
    }
    selEl.value = this.scenarioId;
    descEl.textContent = SCENARIOS[this.scenarioId].desc;
    selEl.onchange = (e) => {
      this.scenarioId = e.target.value;
      descEl.textContent = SCENARIOS[this.scenarioId].desc;
      this.reset();
    };
    const speedEl = document.getElementById('speed');
    const labelEl = document.getElementById('speedLabel');
    // 非线性映射:滑块 0-100 -> 实际延迟 30-2000ms (指数曲线,低端精细,高端粗略)
    // 使用 delay = 30 * (2000/30)^(t/100),t=0 时 30ms,t=100 时 2000ms
    const sliderToDelay = (t) => Math.round(30 * Math.pow(2000 / 30, t / 100));
    const delayToSlider = (d) => Math.round(100 * Math.log(d / 30) / Math.log(2000 / 30));
    speedEl.oninput = (e) => {
      this.speed = sliderToDelay(+e.target.value);
      labelEl.textContent = this.speed + 'ms';
      if (this.running) { this.stop(); this.start(); }
    };
    // 初始化标签
    labelEl.textContent = this.speed + 'ms';
    speedEl.value = delayToSlider(this.speed);
  }
  bindHover() {
    const tip = document.getElementById('hoverTip');
    this.canvas.onmousemove = (e) => {
      const rect = this.canvas.getBoundingClientRect();
      const scaleX = this.canvas.width / rect.width;
      const scaleY = this.canvas.height / rect.height;
      const x = Math.floor((e.clientX - rect.left) * scaleX / CELL_SIZE);
      const y = Math.floor((e.clientY - rect.top) * scaleY / CELL_SIZE);
      const c = this.grid.get(x, y);
      if (c) {
        this.renderer.hoverCell = c;
        const owner = c.owner ? this.states.get(c.owner) : null;
        const contest = c.contestingOwner ? this.states.get(c.contestingOwner) : null;
        const terrainName = ['平原', '山脉', '湖泊', '河流'][c.terrain];
        // 经济产出:平原 +10/山脉 +5/湖泊 0/河流 +3
        const eco = c.terrain === 0 ? 10 : (c.terrain === 1 ? 5 : (c.terrain === 3 ? 3 : 0));
        tip.style.display = 'block';
        tip.style.left = (e.clientX - rect.left + 14) + 'px';
        tip.style.top = (e.clientY - rect.top + 14) + 'px';
        tip.innerHTML = `(${x},${y}) ${terrainName} · 产粮+${eco}` +
          (c.capital ? ' · 都城' : '') +
          (c.city && !c.capital ? ' · 别城' : '') +
          (c.fortress && !c.capital && !c.city ? ' · 关隘' : '') +
          (c.granary && !c.capital ? ' · 粮仓' : '') +
          (owner ? `<br>归属: <span style="color:${owner.bright}">${owner.name}</span> · 民心${Math.floor(owner.morale)}%` : '<br>无主') +
          (c.garrison ? `<br>驻军: ${Math.floor(c.garrison)}` : '') +
          (contest ? `<br>交战: <span style="color:${contest.bright}">${contest.name}</span> (${c.contestTurns}/${CONTEST_TURNS})` : '') +
          (owner ? `<br><span style="color:#6a8aa8">[单击] 全面增强 ${owner.name} · [双击] 操纵台</span>` : '');
        if (c.owner) this.ui.select(c.owner);
      } else {
        this.renderer.hoverCell = null;
        tip.style.display = 'none';
      }
    };
    this.canvas.onmouseleave = () => { this.renderer.hoverCell = null; tip.style.display = 'none'; };
    // 点击:为该格归属国全面提升(兵力/粮草/民心/主将统帅)
    this.canvas.onclick = (e) => {
      const rect = this.canvas.getBoundingClientRect();
      const scaleX = this.canvas.width / rect.width;
      const scaleY = this.canvas.height / rect.height;
      const x = Math.floor((e.clientX - rect.left) * scaleX / CELL_SIZE);
      const y = Math.floor((e.clientY - rect.top) * scaleY / CELL_SIZE);
      const c = this.grid.get(x, y);
      if (!c || !c.owner) return;
      const s = this.states.get(c.owner);
      if (!s || !s.alive) return;
      // 各项参数较大幅提升
      s.troops += 3000;       // 兵力 +3000
      s.food += 1500;         // 粮草 +1500
      s.morale = Math.min(100, s.morale + 20);  // 民心 +20(上限100)
      c.garrison += 2000;     // 该格驻军 +2000
      // 主将统帅力 +5(增强军事力)
      const topG = s.topGeneral();
      if (topG) topG.command = Math.min(100, topG.command + 5);
      c.dirty = true;
      this.ui.select(c.owner);
      this.flashStatus(`${s.name} 全面增强:兵+3000 粮+1500 心+20 将+5`);
    };
    // 双击:打开该国玩家控制面板
    this.canvas.ondblclick = (e) => {
      const rect = this.canvas.getBoundingClientRect();
      const scaleX = this.canvas.width / rect.width;
      const scaleY = this.canvas.height / rect.height;
      const x = Math.floor((e.clientX - rect.left) * scaleX / CELL_SIZE);
      const y = Math.floor((e.clientY - rect.top) * scaleY / CELL_SIZE);
      const c = this.grid.get(x, y);
      if (!c || !c.owner) return;
      const s = this.states.get(c.owner);
      if (!s || !s.alive) return;
      this.openCtrlPanel(s);
    };
  }
  // 玩家控制面板:调整属性/外交
  openCtrlPanel(s) {
    const overlay = document.getElementById('ctrlOverlay');
    const panel = document.getElementById('ctrlPanel');
    const render = () => {
      const others = Array.from(this.states.values()).filter(o => o.id !== s.id);
      panel.innerHTML = `
        <div class="ctrl-title">
          <h3 style="color:${s.bright}">${s.name} · 君王操纵台</h3>
          <span class="ctrl-close" id="ctrlClose">×</span>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-section-title">国力属性</div>
          <div class="ctrl-row"><span class="label">兵力</span><span class="val" id="v_troops">${Math.floor(s.troops)}</span>
            <div class="ctrl-btns">
              <button class="ctrl-btn warn" data-act="troops" data-d="-1000">-1k</button>
              <button class="ctrl-btn warn" data-act="troops" data-d="-5000">-5k</button>
              <button class="ctrl-btn good" data-act="troops" data-d="1000">+1k</button>
              <button class="ctrl-btn good" data-act="troops" data-d="5000">+5k</button>
            </div>
          </div>
          <div class="ctrl-row"><span class="label">粮草</span><span class="val" id="v_food">${Math.floor(s.food)}</span>
            <div class="ctrl-btns">
              <button class="ctrl-btn warn" data-act="food" data-d="-500">-500</button>
              <button class="ctrl-btn good" data-act="food" data-d="500">+500</button>
              <button class="ctrl-btn good" data-act="food" data-d="2000">+2000</button>
            </div>
          </div>
          <div class="ctrl-row"><span class="label">民心</span><span class="val" id="v_morale">${Math.floor(s.morale)}%</span>
            <div class="ctrl-btns">
              <button class="ctrl-btn warn" data-act="morale" data-d="-10">-10</button>
              <button class="ctrl-btn good" data-act="morale" data-d="10">+10</button>
              <button class="ctrl-btn good" data-act="morale" data-d="30">+30</button>
            </div>
          </div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-section-title">君王性情(影响AI决策)</div>
          <div class="ctrl-row"><span class="label">好战</span><span class="val" id="v_war">${s.persona.war}</span>
            <div class="ctrl-btns">
              <button class="ctrl-btn" data-act="war" data-d="-10">-10</button>
              <button class="ctrl-btn" data-act="war" data-d="10">+10</button>
            </div>
          </div>
          <div class="ctrl-row"><span class="label">扩张</span><span class="val" id="v_expand">${s.persona.expand}</span>
            <div class="ctrl-btns">
              <button class="ctrl-btn" data-act="expand" data-d="-10">-10</button>
              <button class="ctrl-btn" data-act="expand" data-d="10">+10</button>
            </div>
          </div>
          <div class="ctrl-row"><span class="label">外交</span><span class="val" id="v_diplo">${s.persona.diplo}</span>
            <div class="ctrl-btns">
              <button class="ctrl-btn" data-act="diplo" data-d="-10">-10</button>
              <button class="ctrl-btn" data-act="diplo" data-d="10">+10</button>
            </div>
          </div>
        </div>
        <div class="ctrl-section">
          <div class="ctrl-section-title">外交政策</div>
          ${others.map(o => {
            const isAlly = s.allies.has(o.id);
            const isWar = s.warTargets.has(o.id);
            const isNeutral = s.neutralWith.has(o.id);
            const stateText = isAlly ? '<span style="color:#5ac888">盟国</span>' :
                              isWar ? '<span style="color:#c8323a">交战</span>' :
                              isNeutral ? '<span style="color:#8a8475">中立</span>' : '<span style="color:#6a8aa8">平和</span>';
            return `<div class="ctrl-diplo-row">
              <span class="ctrl-diplo-name" style="color:${o.bright}">${o.name}</span>
              <span class="ctrl-diplo-state">${stateText}</span>
              <div class="ctrl-diplo-act">
                <button class="ctrl-btn good" data-diplo="ally" data-target="${o.id}" ${isAlly?'disabled':''}>结盟</button>
                <button class="ctrl-btn warn" data-diplo="break" data-target="${o.id}" ${!isAlly?'disabled':''}>撕毁</button>
                <button class="ctrl-btn warn" data-diplo="war" data-target="${o.id}" ${isWar?'disabled':''}>宣战</button>
                <button class="ctrl-btn good" data-diplo="peace" data-target="${o.id}" ${!isWar?'disabled':''}>议和</button>
                <button class="ctrl-btn" data-diplo="neutral" data-target="${o.id}" ${isNeutral?'disabled':''}>中立</button>
              </div>
            </div>`;
          }).join('')}
        </div>
        <div class="ctrl-section">
          <div class="ctrl-section-title">操作</div>
          <button class="ctrl-btn warn" data-act="kill" style="width:100%;padding:6px">立即灭亡 ${s.name}(强制)</button>
        </div>
      `;
      // 绑定关闭
      document.getElementById('ctrlClose').onclick = () => overlay.classList.remove('show');
      // 绑定属性+/-
      panel.querySelectorAll('button[data-act]').forEach(btn => {
        btn.onclick = () => {
          const act = btn.dataset.act;
          if (act === 'kill') {
            const capCell = this.grid.get(s.capital[0], s.capital[1]);
            if (capCell) {
              capCell.owner = null; capCell.garrison = 0; capCell.capital = false;
              capCell.city = false; capCell.fortress = false; capCell.dirty = true;
            }
            this.engine.eliminate(s, s);
            this.flashStatus(`${s.name} 被强制灭亡`);
            overlay.classList.remove('show');
            return;
          }
          const d = parseInt(btn.dataset.d);
          if (act === 'troops') s.troops = Math.max(0, s.troops + d);
          else if (act === 'food') s.food = Math.max(0, s.food + d);
          else if (act === 'morale') s.morale = Math.max(0, Math.min(100, s.morale + d));
          else if (act === 'war') s.persona.war = Math.max(0, Math.min(100, s.persona.war + d));
          else if (act === 'expand') s.persona.expand = Math.max(0, Math.min(100, s.persona.expand + d));
          else if (act === 'diplo') s.persona.diplo = Math.max(0, Math.min(100, s.persona.diplo + d));
          render();  // 刷新面板数值
          this.ui.select(s.id);  // 刷新右侧详情
        };
      });
      // 绑定外交按钮
      panel.querySelectorAll('button[data-diplo]').forEach(btn => {
        btn.onclick = () => {
          const act = btn.dataset.diplo;
          const targetId = btn.dataset.target;
          const target = this.states.get(targetId);
          if (!target) return;
          if (act === 'ally') {
            // 结盟:互加盟约(300回合)
            s.allies.set(targetId, this.engine.turn + 300);
            target.allies.set(s.id, this.engine.turn + 300);
            s.neutralWith.delete(targetId);
            target.neutralWith.delete(s.id);
            s.warTargets.delete(targetId);
            target.warTargets.delete(s.id);
            this.engine.report(this.engine.turn, 'diplomacy', `${s.name}与${target.name}结为盟国(玩家裁定)`, s);
          } else if (act === 'break') {
            // 撕毁:玩家主动撕毁(不触发惩罚,因为是玩家操作)
            s.breakAlliance(this.engine.turn, targetId, '玩家裁定');
            target.breakAlliance(this.engine.turn, s.id, '被玩家撕毁');
            this.engine.report(this.engine.turn, 'diplomacy', `${s.name}撕毁与${target.name}的盟约(玩家裁定)`, s);
          } else if (act === 'war') {
            // 宣战
            s.warTargets.add(targetId);
            s.neutralWith.delete(targetId);
            target.neutralWith.delete(s.id);
            s.hatred[targetId] = (s.hatred[targetId] || 0) + 50;
            this.engine.report(this.engine.turn, 'diplomacy', `${s.name}向${target.name}宣战!(玩家裁定)`, s);
          } else if (act === 'peace') {
            // 议和
            s.warTargets.delete(targetId);
            target.warTargets.delete(s.id);
            s.hatred[targetId] = Math.max(0, (s.hatred[targetId] || 0) - 30);
            this.engine.report(this.engine.turn, 'diplomacy', `${s.name}与${target.name}议和(玩家裁定)`, s);
          } else if (act === 'neutral') {
            // 中立:既不结盟也不交战
            s.neutralWith.add(targetId);
            target.neutralWith.add(s.id);
            s.allies.delete(targetId);
            target.allies.delete(s.id);
            s.warTargets.delete(targetId);
            target.warTargets.delete(s.id);
            this.engine.report(this.engine.turn, 'diplomacy', `${s.name}与${target.name}立约中立(玩家裁定)`, s);
          }
          render();
          this.ui.select(s.id);
        };
      });
    };
    render();
    overlay.classList.add('show');
    // 点击遮罩关闭
    overlay.onclick = (e) => {
      if (e.target === overlay) overlay.classList.remove('show');
    };
  }
  // 状态栏短暂提示
  flashStatus(text) {
    if (this._flashTimer) clearTimeout(this._flashTimer);
    const el = document.getElementById('statusText');
    el.textContent = text;
    el.style.color = 'var(--gold-bright)';
    this._flashTimer = setTimeout(() => {
      el.style.color = '';
      el.textContent = this.running ? '推演中' : '已暂停';
    }, 1500);
  }
  toggle() {
    if (this.running) this.stop();
    else this.start();
  }
  start() {
    this.running = true;
    document.getElementById('btnPlay').textContent = '⏸ 暂停';
    document.getElementById('btnPlay').classList.add('active');
    if (this.timer) clearInterval(this.timer);
    this.timer = setInterval(() => this.step(), this.speed);
    this.updateStatus('推演中');
  }
  stop() {
    this.running = false;
    document.getElementById('btnPlay').textContent = '▶ 启动';
    document.getElementById('btnPlay').classList.remove('active');
    if (this.timer) { clearInterval(this.timer); this.timer = null; }
    this.updateStatus('已暂停');
  }
  step() {
    const prevSeason = currentSeason(this.engine.turn);
    this.engine.tick();
    this.diplomacy.tick(this.engine.turn);
    const curSeason = currentSeason(this.engine.turn);
    // 换季通知
    if (prevSeason !== curSeason) {
      this.ui.addReport(this.engine.turn, 'event', `时令更替: ${prevSeason} → ${curSeason}`, null);
    }
    document.getElementById('turnCount').textContent = this.engine.turn;
    document.getElementById('seasonLabel').textContent = curSeason;
    const alive = Array.from(this.states.values()).filter(s => s.alive).length;
    document.getElementById('aliveCount').textContent = alive;
    this.ui.refreshTabs();
    this.ui.renderRanking();
    if (this.ui.selected) this.ui.renderDetail();
    if (alive <= 1) {
      this.stop();
      const winner = Array.from(this.states.values()).find(s => s.alive);
      if (winner) this.ui.addReport(this.engine.turn, 'capital', `${winner.name}一统天下,霸业成!`, winner);
      this.updateStatus(`${winner?.name || '无人'}一统`);
    }
  }
  reset() {
    this.stop();
    document.getElementById('reports').innerHTML = '';
    this.ui.reportCount = 0;
    document.getElementById('reportCount').textContent = '0 条';
    document.getElementById('turnCount').textContent = '0';
    document.getElementById('aliveCount').textContent = '7';
    this.init();
  }
  // 导出当前战局为 PNG:canvas + 标题/回合/季节/国力榜合成
  exportScreenshot() {
    const W = 1100, H = 720;
    const out = document.createElement('canvas');
    out.width = W; out.height = H;
    const ctx = out.getContext('2d');
    // 背景
    ctx.fillStyle = '#050507';
    ctx.fillRect(0, 0, W, H);
    // 标题
    ctx.fillStyle = '#e8c887';
    ctx.font = 'bold 22px "Songti SC", "STSong", serif';
    ctx.textBaseline = 'top';
    ctx.fillText(`战国七雄 · ${SCENARIOS[this.scenarioId].name}`, 20, 16);
    ctx.fillStyle = '#8a8475';
    ctx.font = '12px monospace';
    const aliveCount = Array.from(this.states.values()).filter(s => s.alive).length;
    ctx.fillText(`回合 ${this.engine.turn} · 时令 ${currentSeason(this.engine.turn)} · 存活 ${aliveCount} 国`, 20, 48);
    // 主战图(canvas 缩放贴到左侧 660x660)
    ctx.drawImage(this.canvas, 20, 70, 660, 660);
    // 右侧国力榜
    const rx = 700, ry = 70;
    ctx.fillStyle = '#c9a96a';
    ctx.font = 'bold 13px "Songti SC", serif';
    ctx.fillText('诸侯国力榜', rx, ry);
    ctx.fillStyle = '#8a8475';
    ctx.font = '11px monospace';
    const arr = Array.from(this.states.values()).sort((a, b) => b.power() - a.power());
    const maxP = Math.max(...arr.map(s => s.power()), 1);
    arr.forEach((s, i) => {
      const y = ry + 24 + i * 28;
      // 国号
      ctx.fillStyle = s.bright;
      ctx.font = 'bold 13px "Songti SC", serif';
      ctx.fillText(`${i + 1}. ${s.name}`, rx, y);
      // 状态
      ctx.fillStyle = s.alive ? '#8a8475' : '#4a4639';
      ctx.font = '11px monospace';
      ctx.fillText(s.alive ? `${s.cellCount}城 / ${Math.floor(s.troops)}兵` : '已亡', rx + 60, y + 2);
      // 国力条
      const barW = 280;
      ctx.fillStyle = 'rgba(120,100,70,0.2)';
      ctx.fillRect(rx, y + 18, barW, 4);
      ctx.fillStyle = s.color;
      ctx.fillRect(rx, y + 18, barW * (s.power() / maxP), 4);
    });
    // 底部说明
    ctx.fillStyle = '#4a4639';
    ctx.font = '10px monospace';
    ctx.fillText(`Generated by 战国七雄网格争霸模拟器 · ${new Date().toLocaleString('zh-CN')}`, 20, H - 20);
    // 下载
    out.toBlob((blob) => {
      if (!blob) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `战国七雄_${SCENARIOS[this.scenarioId].name}_T${this.engine.turn}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      this.flashStatus(`📷 已保存: ${a.download}`);
    }, 'image/png');
  }
  updateStatus(txt) {
    document.getElementById('statusText').textContent = txt;
  }
  render() {
    // 用 renderer 引用判断:reset 后 renderer 被替换,旧循环自动停止
    const r = this.renderer;
    const loop = () => {
      if (this.renderer !== r) return;  // 已被新循环取代
      r.draw();
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  }
}

const app = new App();
</script>
